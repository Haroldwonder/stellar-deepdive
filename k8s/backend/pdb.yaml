apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stellar-deepdive-backend
  namespace: stellar-deepdive
  labels:
    app: stellar-deepdive
    component: backend
spec:
  minAvailable: 2  # Always keep at least 2 pods running
  selector:
    matchLabels:
      app: stellar-deepdive
      component: backend
  unhealthyPodEvictionPolicy: IfHealthyBudget
